name: Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:

    name: blogmore.el unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - "29.1"
          - "29.2"
          - "29.3"
          - "29.4"
          - "30.1"
          - "30.2"
          - "release-snapshot"
          - "snapshot"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run ERT tests
        run: |
          emacs --version
          make test

### tests.yml ends here
